<!DOCTYPE html>
<!--
  Adam Thomas Janes Portfolio — 404 Page
  Purpose: Provides a polished fallback if a visitor follows an outdated portfolio URL.
  Keep this simple, lightweight, and consistent with the main portfolio voice.
-->
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZZBXQZX2LR"></script>
<script src="analytics.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Adam Thomas Janes</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="stylesheet" href="styles.css?v=8.1.0" />
</head>
<body>
  <!-- Minimal recovery page: route visitors back to the main portfolio quickly. -->
  <main class="error-page" style="min-height:100vh;display:grid;place-items:center;padding:2rem;text-align:center;">
    <section aria-labelledby="error-title">
      <p class="eyebrow">404</p>
      <h1 id="error-title">This page moved or no longer exists.</h1>
      <p>Return to the Adam Thomas Janes portfolio to view selected work, archive projects, and contact information.</p>
      <p><a class="btn" href="/">Back to portfolio</a></p>
    </section>
  </main>
</body>
</html>
