# ============================================================
# Netlify configuration for Adam Thomas Janes portfolio
# ============================================================
# This is a static HTML/CSS/JS site. No build step is required.
# Netlify should publish the repository root because index.html lives here.
# Keep this file in the repo so deployment expectations are explicit.

[build]
  publish = "."

# Security/SEO-friendly headers for static deployment.
# These are conservative defaults and can be adjusted later if new integrations need them.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://analytics.google.com; media-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"

# Cache static assets briefly enough that same-name portfolio updates reach returning visitors.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# HTML should revalidate so editorial and portfolio updates appear immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Large downloadable resources rarely change and should not be re-fetched unnecessarily.
[[headers]]
  for = "/assets/resources/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
